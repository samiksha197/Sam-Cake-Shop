<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Order | Cake Shop</title>
    <link rel="stylesheet" href="order-style.css">

<style>
/* Styling for Order Page */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, sans-serif;
}

body {
    background-color: #fef9f6;
    padding: 40px 10%;
    color: #444;
}

.order-wrapper {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 40px;
    max-width: 1100px;
    margin: 0 auto;
}

/* Form Styles */
.checkout-form {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.checkout-form h2 {
    margin-bottom: 30px;
    color: #5d4037;
    border-bottom: 2px solid #f1f1f1;
    padding-bottom: 10px;
}

.form-section {
    margin-bottom: 30px;
}

.form-section h3 {
    font-size: 1.1rem;
    margin-bottom: 15px;
    color: #8d6e63;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.input-group {
    margin-bottom: 20px;
}

.input-row {
    display: flex;
    gap: 20px;
}

.input-row .input-group {
    flex: 1;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 0.9rem;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s;
}

input:focus, textarea:focus {
    border-color: #d2691e;
}

.submit-order-btn {
    width: 100%;
    background: #d2691e;
    color: white;
    padding: 18px;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
}

.submit-order-btn:hover {
    background: #a0522d;
}

/* Order Summary Styles */
.summary-card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    position: sticky;
    top: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    border: 1px solid #eee;
}

.summary-card h3 {
    margin-bottom: 20px;
}

.selected-item {
    display: flex;
    gap: 15px;
    padding-bottom: 20px;
    border-bottom: 1px solid #eee;
    margin-bottom: 20px;
}

.selected-item img {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
}

.item-info h4 { font-size: 1rem; }
.item-info p { font-size: 0.85rem; color: #777; }
.unit-price { font-weight: bold; color: #d2691e; margin-top: 5px; }

.total-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.grand-total {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 2px dashed #eee;
    font-size: 1.25rem;
    font-weight: bold;
    color: #333;
}

.secure-note {
    text-align: center;
    margin-top: 20px;
    font-size: 0.8rem;
    color: #999;
}

/* Mobile View */
@media (max-width: 850px) {
    .order-wrapper {
        grid-template-columns: 1fr;
    }
    .order-summary {
        order: -1; /* Summary appears on top on mobile */
    }
}
</style>
</head>
<body>

    <div class="order-wrapper">
        <main class="checkout-form">
            <h2>Checkout Details</h2>
            
            <form id="cakeOrderForm">
                <div class="form-section">
                    <h3>Contact Information</h3>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" placeholder="email@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>Phone</label>
                            <input type="tel" placeholder="(555) 000-0000" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Delivery / Pickup Details</h3>
                    <div class="input-group">
                        <label>Select Date</label>
                        <input type="date" required>
                    </div>
                    <div class="input-group">
                        <label>Special Instructions or Cake Message</label>
                        <textarea rows="4" placeholder="Write the text you want on the cake (e.g., Happy Birthday Jamie!)"></textarea>
                    </div>
                </div>

                <button type="submit" class="submit-order-btn">Place Order Now</button>
            </form>
        </main>

        <aside class="order-summary">
            <div class="summary-card">
                <h3>Order Summary</h3>
                <div class="selected-item">
                    <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587" alt="Cake Preview">
                    <div class="item-info">
                        <h4>Midnight Chocolate</h4>
                        <p>Quantity: 1</p>
                        <p class="unit-price">$45.00</p>
                    </div>
                </div>

                <div class="totals">
                    <div class="total-row">
                        <span>Subtotal</span>
                        <span>$45.00</span>
                    </div>
                    <div class="total-row">
                        <span>Delivery Fee</span>
                        <span>$5.00</span>
                    </div>
                    <div class="total-row grand-total">
                        <span>Total Amount</span>
                        <span>$50.00</span>
                    </div>
                </div>
                
                <p class="secure-note">🔒 Secure Checkout</p>
            </div>
        </aside>
    </div>

</body>
</html>
