<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sweet Delights</title>
    <link rel="stylesheet" href="contact-style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background-color: #fdf8f5;
    padding: 60px 10%;
    color: #4a3728;
}

.contact-container {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 50px;
    background: #fff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
}

/* Form Styles */
.contact-form h2 {
    font-size: 2rem;
    margin-bottom: 10px;
    color: #5d4037;
}

.contact-form p {
    margin-bottom: 30px;
    color: #777;
    line-height: 1.6;
}

.input-group {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    background: #f9f9f9;
    font-size: 1rem;
    outline: none;
}

input:focus, textarea:focus {
    border-color: #ff69b4;
    background: #fff;
}

.send-btn {
    background: #ff69b4;
    color: white;
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.send-btn:hover {
    background: #e05599;
    transform: scale(1.02);
}

/* Sidebar Styles */
.contact-info {
    background: #fffafa;
    padding: 30px;
    border-radius: 15px;
    border: 1px solid #fce4ec;
}

.info-box {
    margin-bottom: 25px;
}

.info-box h3 {
    color: #ff69b4;
    font-size: 1.1rem;
    margin-bottom: 5px;
}

.info-box p {
    color: #5d4037;
}

.social-icons {
    margin-top: 10px;
    color: #d2691e;
    cursor: pointer;
    font-weight: 500;
}

/* Responsive Design */
@media (max-width: 850px) {
    .contact-container {
        grid-template-columns: 1fr;
        padding: 20px;
    }
    
    body {
        padding: 20px;
    }
}
</style>
</head>
<body>

    <div class="contact-container">
        <section class="contact-form">
            <h2>Send us a Message</h2>
            <p>Have a question about our cakes or need a custom quote? We'd love to hear from you!</p>
            
            <form action="#">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>
                
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>

                <div class="input-group">
                    <label>Subject</label>
                    <select>
                        <option>General Inquiry</option>
                        <option>Custom Cake Quote</option>
                        <option>Order Status</option>
                        <option>Feedback</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </section>

        <aside class="contact-info">
            <div class="info-box">
                <h3>Visit Our Bakery</h3>
                <p>Sangola road,Pandharpur</p>
            </div>

            <div class="info-box">
                <h3>Opening Hours</h3>
                <p><strong>Mon - Fri:</strong> 9:00 AM - 7:00 PM</p>
                <p><strong>Sat - Sun:</strong> 10:00 AM - 5:00 PM</p>
            </div>

            <div class="info-box">
                <h3>Call Us</h3>
                <p>8208484390</p>
            </div>

            <div class="social-links">
                <h3>Follow the Sweetness</h3>
                <div class="social-icons">
                    <span>Instagram</span> • <span>Facebook</span> • <span>Pinterest</span>
                </div>
            </div>
        </aside>
    </div>

</body>
</html>
